services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/docker-ollama-entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "11434:11434"
    environment:
      CHAT_MODEL: ${CHAT_MODEL:-llama3.2:3b}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-nomic-embed-text}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 900s
    restart: unless-stopped
    # Uncomment for NVIDIA GPU (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  chromadb:
    image: chromadb/chroma:latest
    container_name: rag-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
      IS_PERSISTENT: "TRUE"
    restart: unless-stopped

  app:
    build: .
    container_name: rag-app
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_started
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      OLLAMA_BASE_URLS: http://ollama:11434
      CHROMA_HTTP_HOST: chromadb
      CHROMA_HTTP_PORT: 8000
      DATA_DIR: /data/open-webui
      CHAT_MODEL: ${CHAT_MODEL:-llama3.2:3b}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-nomic-embed-text}
    volumes:
      - app_data:/data/open-webui
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  app_data:
